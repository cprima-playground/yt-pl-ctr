name: Sync JRE Playlists

# Classifies the latest JRE episodes and adds them to the configured YouTube playlists.
#
# In CI, transcripts are not available (yt-dlp is bot-blocked on GitHub Actions IPs).
# Classification runs on title + description only, using the committed model at
# models/joe_rogan_experience/. The 0.08 confidence threshold is calibrated for this
# 38-class model — episodes below threshold are skipped rather than misclassified.
#
# Scheduled after 07:15 UTC — YouTube quota resets at midnight PDT (= 07:00 UTC).

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Videos to process'
        required: false
        default: '30'
      dry_run:
        description: 'Dry run — classify but do not write to YouTube'
        type: boolean
        default: false
  schedule:
    # Run daily at 07:23 UTC (after YouTube quota reset at 07:00 UTC / midnight PDT)
    - cron: "23 7 * * *"

# Prevent concurrent runs — a slow or stuck run must finish before the next fires.
concurrency:
  group: sync-jre
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Sync JRE playlists
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          LIMIT="${{ inputs.limit || 30 }}"
          DRY_RUN="${{ inputs.dry_run }}"

          CMD=(uv run yt-pl-ctr sync
            --config configs/channels.yaml
            --channel "https://www.youtube.com/@joerogan/videos"
            --limit "$LIMIT"
            --verbose
          )

          if [ "$DRY_RUN" = "true" ]; then
            CMD+=(--dry-run)
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}"
