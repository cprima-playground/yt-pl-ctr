name: Sync Neutrality Studies Playlists

# Classifies the latest Neutrality Studies episodes and adds them to the
# configured YouTube playlists.
#
# In CI, transcripts are not available (yt-dlp is bot-blocked on GitHub Actions IPs).
# Classification runs on title + description only, using the committed model at
# models/neutrality_studies/.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Videos to process'
        required: false
        default: '30'
      dry_run:
        description: 'Dry run — classify but do not write to YouTube'
        type: boolean
        default: false
  schedule:
    # Run daily at 05:11 UTC (offset from JRE 03:23 and CO 04:17 to avoid quota overlap)
    - cron: "11 5 * * *"

# Prevent concurrent runs — a slow or stuck run must finish before the next fires.
concurrency:
  group: sync-neutrality-studies
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Sync Neutrality Studies playlists
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          LIMIT="${{ inputs.limit || 30 }}"
          DRY_RUN="${{ inputs.dry_run }}"

          CMD=(uv run yt-pl-ctr sync
            --config configs/channels.yaml
            --channel "https://www.youtube.com/@neutralitystudies/videos"
            --limit "$LIMIT"
            --verbose
          )

          if [ "$DRY_RUN" = "true" ]; then
            CMD+=(--dry-run)
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}"
