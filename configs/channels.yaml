# Multi-channel playlist configuration
playlist_settings:
  privacy: unlisted
  description_template: "Auto-curated by yt-pl-ctr"

limit: 30

channels:
  # Joe Rogan Experience
  - url: "https://www.youtube.com/@joerogan/videos"
    playlist_prefix: "JRE"
    default_category: "other"
    skip_default: true  # Only add videos that match a category
    use_wikipedia: true  # Use Wikipedia to classify unknown guests
    guest_pattern: "\\s-\\s(.+)$"
    min_duration: 3600  # Skip videos shorter than 1 hour
    categories:
      science_tech:
        name: "Science & Technology"
        keywords:
          - "artificial intelligence"
          - "neuroscience"
          - "biology"
          - "physics"
          - "space"
          - "NASA"
          - "SpaceX"
          - "technology"
          - "science"
          - "research"
          - "brain"
          - "quantum"
        guests:
          - "Elon Musk"
          - "Andrew Huberman"
          - "Lex Fridman"
          - "Neil deGrasse Tyson"
          - "Brian Cox"
          - "Rhonda Patrick"
          - "Sam Harris"
          - "Matthew Walker"
          - "Paul Stamets"

      ufo_aliens:
        name: "UFOs & Extraterrestrial Life"
