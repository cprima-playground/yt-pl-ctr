# yt-pl-ctr channel configuration

playlist_settings:
  privacy: unlisted
  description_template: "Auto-curated by yt-pl-ctr"

channels:
  - name: "Joe Rogan Experience"
    url: "https://www.youtube.com/@joerogan/videos"
    channel_id: "UCzQUP1qoWDoEbmsQxvdjxgQ"
    playlist_prefix: "JRE"
    min_duration: 3600
    ml_confidence_threshold: 0.08

    # Every node has the same shape: slug + label + optional children.
    # Leaf nodes (no children) are the ML class labels.
    taxonomy:
      - slug: history_unexplained
        label: "History & Unexplained"
        children:
          - slug: ancient_civilizations
            label: "ancient civilizations"
          - slug: ufo_extraterrestrial
            label: "ufo / extraterrestrial"
          - slug: paranormal_cryptozoology
            label: "paranormal / cryptozoology"
          - slug: conspiracy_theories
            label: "conspiracy theories"
          - slug: anthropology_archaeology
            label: "anthropology & archaeology"

      - slug: science_mind
        label: "Science & Mind"
        children:
          - slug: psychology_mental_health
            label: "psychology & mental health"
          - slug: neuroscience
            label: "neuroscience"
          - slug: health_medicine
            label: "health & medicine"
          - slug: nutrition_diet
            label: "nutrition & diet"
          - slug: longevity_biohacking
            label: "longevity & biohacking"
          - slug: biology_evolution
            label: "biology & evolution"
          - slug: physics_mathematics
            label: "physics & mathematics"
          - slug: space_astronomy
            label: "space & astronomy"
          - slug: natural_history_wildlife
            label: "natural history & wildlife"
          - slug: environment_climate
            label: "environment & climate"

      - slug: technology_economy
        label: "Technology & Economy"
        children:
          - slug: technology
            label: "technology"
          - slug: artificial_intelligence
            label: "artificial intelligence"
          - slug: cryptocurrency_finance
            label: "cryptocurrency & finance"
          - slug: economics_business
            label: "economics & business"
          - slug: entrepreneurship
            label: "entrepreneurship"

      - slug: society_culture
        label: "Society & Culture"
        children:
          - slug: politics_government
            label: "politics & government"
          - slug: social_issues_culture
            label: "social issues & culture"
          - slug: true_crime
            label: "true crime"
          - slug: law_justice
            label: "law & justice"
          - slug: military_veterans
            label: "military & veterans"
          - slug: religion_spirituality
            label: "religion & spirituality"
          - slug: philosophy
            label: "philosophy"
          - slug: drugs_psychedelics
            label: "drugs & psychedelics"

      - slug: arts_entertainment
        label: "Arts & Entertainment"
        children:
          - slug: comedy
            label: "comedy"
          - slug: music
            label: "music"
          - slug: film_television
            label: "film & television"
          - slug: literature_storytelling
            label: "literature & storytelling"

      - slug: sports_outdoors
        label: "Sports & Outdoors"
        children:
          - slug: combat_sports_mma
            label: "combat sports & mma"
          - slug: hunting_fishing
            label: "hunting & fishing"
          - slug: fitness_training
            label: "fitness & training"
          - slug: extreme_sports_adventure
            label: "extreme sports & adventure"

      - slug: lifestyle
        label: "Lifestyle"
        children:
          - slug: food_cooking
            label: "food & cooking"
          - slug: motivation_self_improvement
            label: "motivation & self-improvement"

    # Slugs that become YouTube playlists — must match leaf slugs in taxonomy.
    playlists:
      ancient_civilizations:
        title: "JRE: History & Unexplained / Ancient Civilizations & Alternative History"
      ufo_extraterrestrial:
        title: "JRE: History & Unexplained / UFO, Paranormal & Cryptozoology"
      paranormal_cryptozoology:
        title: "JRE: History & Unexplained / UFO, Paranormal & Cryptozoology"
      psychology_mental_health:
        title: "JRE: Science & Mind / Psychology & Mental Health"

  - name: "Candace Owens"
    url: "https://www.youtube.com/@RealCandaceO/videos"
    channel_id: "UCL0u5uz7KZ9q-pe-VC8TY-w"
    playlist_prefix: "CO"
    min_duration: 600         # 10 min — include show segments, not just shorts
    max_age_days: 730
    ingest_limit: 1500
    ml_confidence_threshold: 0.08

    taxonomy:
      - slug: politics_government
        label: "Politics & Government"
        children:
          - slug: us_elections_politics
            label: "US elections & domestic politics"
          - slug: deep_state_censorship
            label: "deep state & censorship"    # merged: deep_state_establishment + censorship_free_speech
          - slug: global_geopolitics
            label: "global geopolitics & wars"

      - slug: media_culture
        label: "Media & Culture"
        children:
          - slug: media_celebrity
            label: "media & celebrity culture"  # merged: celebrity_controversy + mainstream_media_criticism + entertainment_news

      - slug: society_law
        label: "Society & Law"
        children:
          - slug: lawsuits_courts
            label: "lawsuits & courts"
          - slug: society_values
            label: "society & values"           # merged: gender_feminism + family_values_religion + crime_public_safety

      - slug: international_affairs
        label: "International Affairs"
        children:
          - slug: france_europe
            label: "France & Europe"

    # Keyword-based playlists (entity/mention matching — no ML model required)
    keyword_playlists:
      france_europe:
        title: "CO: International / France & Europe"
        min_mentions: 5
        keywords:
          - "Brigitte Macron"
          - "Emmanuel Macron"
          - "Macron"
      celebrity_controversy:
        title: "CO: Media / Celebrity Controversy & Hollywood"
        min_mentions: 5
        keywords:
          - "Blake Lively"
          - "Justin Baldoni"
          - "It Ends with Us"
          - "Ryan Reynolds"

