# JRE (Joe Rogan Experience) playlist configuration
channel_url: "https://www.youtube.com/@joerogan/videos"
playlist_prefix: "JRE"
playlist_privacy: "unlisted"

# Categories with keyword-based classification
# Each category can have:
#   - keywords: list of keywords to match in title/description (case-insensitive)
#   - guests: list of known guest names that belong to this category
categories:
  comedian:
    keywords:
      - "comedy"
      - "stand-up"
      - "standup"
      - "comedian"
      - "funny"
    guests:
      - "Dave Chappelle"
      - "Joe List"
      - "Mark Normand"
      - "Shane Gillis"
      - "Andrew Schulz"
      - "Theo Von"
      - "Tom Segura"
      - "Bert Kreischer"
      - "Bill Burr"
      - "Tony Hinchcliffe"
      - "Whitney Cummings"
      - "Tim Dillon"
      - "Bobby Lee"
      - "Ari Shaffir"

  athlete:
    keywords:
      - "UFC"
      - "MMA"
      - "fighter"
      - "boxing"
      - "wrestling"
      - "champion"
      - "athlete"
      - "Olympics"
      - "marathon"
      - "triathlon"
    guests:
      - "Jocko Willink"
      - "David Goggins"
      - "Cameron Hanes"
      - "Gordon Ryan"
      - "Israel Adesanya"
      - "Conor McGregor"
      - "GSP"
      - "Georges St-Pierre"

  scientist:
    keywords:
      - "PhD"
      - "professor"
      - "research"
      - "study"
      - "science"
      - "neuroscience"
      - "biology"
      - "physics"
      - "chemistry"
    guests:
      - "Andrew Huberman"
      - "Rhonda Patrick"
      - "Brian Cox"
      - "Neil deGrasse Tyson"
      - "Lex Fridman"
      - "Sam Harris"

  ancient_civilization:
    keywords:
      - "ancient"
      - "civilization"
      - "archaeology"
      - "pyramids"
      - "Egypt"
      - "Göbekli Tepe"
      - "lost civilization"
      - "prehistoric"
    guests:
      - "Graham Hancock"
      - "Randall Carlson"
      - "John Anthony West"

  alien:
    keywords:
      - "UFO"
      - "UAP"
      - "alien"
      - "extraterrestrial"
      - "disclosure"
      - "Pentagon"
      - "abduction"
    guests:
      - "Bob Lazar"
      - "Jeremy Corbell"
      - "David Fravor"
      - "Luis Elizondo"

  politics:
    keywords:
      - "election"
      - "president"
      - "congress"
      - "senator"
      - "policy"
      - "government"
    guests:
      - "Bernie Sanders"
      - "Tulsi Gabbard"
      - "Dan Crenshaw"

# Default category when no match is found
default_category: "other"

# Title pattern to extract guest name
# Captures text after " - " (e.g., "Joe Rogan Experience #1234 - Guest Name")
guest_pattern: "\\s-\\s(.+)$"
